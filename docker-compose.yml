version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: task-manager-db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - task-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: task-manager-api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/task-manager?authSource=admin
      - JWT_SECRET=your_jwt_secret_key_here
      - NODE_ENV=development
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - task-network
    command: npm run dev

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: task-manager-ui
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - task-network
    command: npm run dev

volumes:
  mongodb_data:

networks:
  task-network:
    driver: bridge
